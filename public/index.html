<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APIFlow Constellation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <style>
      :root {
        --ink: #0f1f44;
        --ink-soft: #3f5183;
        --line: rgba(25, 49, 104, 0.16);
        --shell: rgba(255, 255, 255, 0.84);
        --shell-strong: rgba(255, 255, 255, 0.96);
        --primary: #245fe4;
        --teal: #0cae96;
        --amber: #f29a2b;
        --rose: #e75173;
        --violet: #6f53ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 8%, rgba(42, 120, 255, 0.34), transparent 36%),
          radial-gradient(circle at 92% 8%, rgba(255, 137, 67, 0.34), transparent 35%),
          radial-gradient(circle at 85% 88%, rgba(115, 90, 255, 0.27), transparent 36%),
          radial-gradient(circle at 12% 86%, rgba(22, 180, 157, 0.23), transparent 34%),
          linear-gradient(145deg, #fff7e7, #edf3ff 48%, #f4efff 100%);
      }

      .shell {
        min-height: 100vh;
        padding: 20px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 14px;
      }

      .topbar {
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 16px 18px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        background: var(--shell);
        backdrop-filter: blur(16px);
        box-shadow: 0 18px 48px rgba(25, 49, 104, 0.14);
        animation: rise 420ms ease;
      }

      .brand h1 {
        margin: 0;
        font-family: "Syne", sans-serif;
        font-size: 34px;
        letter-spacing: -0.05em;
      }

      .brand p {
        margin: 7px 0 0;
        color: var(--ink-soft);
        max-width: 760px;
        font-size: 14px;
      }

      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .badge {
        border: 1px solid rgba(25, 49, 104, 0.2);
        border-radius: 999px;
        background: var(--shell-strong);
        color: #1f3f76;
        font-size: 11px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        padding: 7px 11px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(120px, 172px));
        gap: 10px;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }

      .back-main-btn {
        border: 1px solid rgba(25, 49, 104, 0.22);
        border-radius: 12px;
        background: linear-gradient(120deg, #e75173, #6f53ff);
        color: #ffffff;
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        padding: 10px 13px;
        cursor: pointer;
        white-space: nowrap;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--shell-strong);
        padding: 10px 12px;
      }

      .stat strong {
        display: block;
        font-family: "Syne", sans-serif;
        font-size: 23px;
      }

      .stat span {
        color: var(--ink-soft);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .view-grid {
        min-height: 0;
        display: grid;
        gap: 12px;
      }

      .overview-grid {
        grid-template-columns: 300px minmax(760px, 1fr) 360px;
      }

      .detail-grid {
        grid-template-columns: minmax(780px, 1fr) 380px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--shell);
        box-shadow: 0 14px 36px rgba(28, 51, 101, 0.11);
        overflow: hidden;
        min-height: 0;
        animation: rise 380ms ease;
      }

      .panel-head {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.66);
      }

      .panel-head h2 {
        margin: 0;
        font-family: "Syne", sans-serif;
        font-size: 17px;
        letter-spacing: -0.02em;
      }

      .panel-head p {
        margin: 4px 0 0;
        color: var(--ink-soft);
        font-size: 12px;
      }

      .navigator-body {
        padding: 12px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 10px;
        height: calc(100% - 72px);
      }

      .search input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        font-size: 13px;
        background: #fff;
        outline: none;
      }

      .search input:focus {
        border-color: rgba(36, 95, 228, 0.62);
        box-shadow: 0 0 0 3px rgba(36, 95, 228, 0.18);
      }

      .endpoint-list {
        margin: 0;
        padding: 0;
        list-style: none;
        overflow: auto;
        display: grid;
        gap: 8px;
      }

      .endpoint-btn {
        width: 100%;
        text-align: left;
        border: 1px solid rgba(25, 49, 104, 0.16);
        border-radius: 14px;
        background: linear-gradient(140deg, #ffffff, #f6f9ff);
        padding: 10px;
        cursor: pointer;
        transition: transform 130ms ease, box-shadow 130ms ease, border-color 130ms ease;
      }

      .endpoint-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(36, 95, 228, 0.52);
        box-shadow: 0 9px 24px rgba(36, 95, 228, 0.16);
      }

      .endpoint-btn.active {
        border-color: rgba(231, 81, 115, 0.52);
        box-shadow: 0 9px 24px rgba(231, 81, 115, 0.16);
        background: linear-gradient(145deg, #ffffff, #fff3f6);
      }

      .endpoint-top {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .method {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 52px;
        height: 22px;
        border-radius: 999px;
        padding: 0 8px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.03em;
      }

      .m-get {
        background: rgba(12, 174, 150, 0.2);
        color: #0b7c6c;
      }

      .m-post {
        background: rgba(36, 95, 228, 0.2);
        color: #244eb5;
      }

      .m-put {
        background: rgba(242, 154, 43, 0.24);
        color: #9a5a0a;
      }

      .m-patch {
        background: rgba(111, 83, 255, 0.22);
        color: #5239c4;
      }

      .m-delete {
        background: rgba(231, 81, 115, 0.24);
        color: #a72c48;
      }

      .endpoint-path {
        font-weight: 700;
        color: #18366b;
        font-size: 13px;
      }

      .endpoint-summary {
        margin: 7px 0 0;
        font-size: 12px;
        color: var(--ink-soft);
        line-height: 1.38;
      }

      .map-panel,
      .journey-panel {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .map-wrap {
        min-height: 0;
        padding: 12px;
        position: relative;
      }

      .map-note {
        position: absolute;
        left: 20px;
        right: 20px;
        bottom: 20px;
        border: 1px solid rgba(25, 49, 104, 0.2);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.9);
        color: #224379;
        font-size: 13px;
        padding: 10px 12px;
      }

      .overview-svg {
        width: 100%;
        height: calc(100vh - 188px);
        min-height: 540px;
        display: block;
        border-radius: 16px;
        border: 1px solid rgba(25, 49, 104, 0.15);
        background: linear-gradient(155deg, #f8f2ff, #ebf4ff 48%, #f9fff1);
      }

      .bubble {
        cursor: pointer;
      }

      .bubble .surface {
        transition: transform 140ms ease, filter 140ms ease;
        transform-origin: center;
      }

      .bubble:hover .surface {
        transform: scale(1.03);
      }

      .bubble.selected .surface {
        filter: drop-shadow(0 10px 20px rgba(231, 81, 115, 0.35));
      }

      .api-label {
        fill: #112d5e;
        text-anchor: middle;
      }

      .api-label.method {
        font-size: 12px;
        font-weight: 800;
      }

      .api-label.path {
        font-size: 12px;
        font-weight: 700;
      }

      .overview-side {
        padding: 14px;
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .showcase {
        border: 1px solid rgba(25, 49, 104, 0.18);
        border-radius: 14px;
        padding: 12px;
        background: var(--shell-strong);
      }

      .showcase h3 {
        margin: 0;
        font-family: "Syne", sans-serif;
        font-size: 15px;
      }

      .showcase p {
        margin: 7px 0 0;
        color: var(--ink-soft);
        font-size: 13px;
        line-height: 1.42;
      }

      .primary-btn,
      .ghost-btn {
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 9px 12px;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary-btn {
        background: linear-gradient(120deg, #265fe4, #6f53ff);
        color: #fff;
      }

      .ghost-btn {
        border-color: rgba(25, 49, 104, 0.2);
        background: rgba(255, 255, 255, 0.92);
        color: #1e4178;
      }

      .journey-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .journey-toolbar .route {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .journey-toolbar .route span {
        font-family: "Syne", sans-serif;
        font-size: 19px;
        letter-spacing: -0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .journey-wrap {
        min-height: 0;
        padding: 12px;
      }

      .journey-scroll {
        width: 100%;
        height: calc(100vh - 198px);
        min-height: 520px;
        overflow: auto;
        border-radius: 16px;
        border: 1px solid rgba(25, 49, 104, 0.16);
        background: linear-gradient(160deg, #f2f8ff, #fff5ec 60%, #f5efff);
      }

      .journey-svg {
        display: block;
      }

      .flow-edge {
        fill: none;
        stroke: rgba(37, 88, 179, 0.62);
        stroke-width: 2;
      }

      .resource-edge {
        fill: none;
        stroke: rgba(56, 94, 168, 0.34);
        stroke-width: 1.4;
      }

      .flow-label,
      .resource-label {
        text-anchor: middle;
      }

      .flow-label.step {
        fill: #fff;
        font-size: 11px;
        font-weight: 800;
      }

      .flow-label.body {
        fill: #ebf3ff;
        font-size: 10px;
      }

      .resource-label {
        fill: #13305f;
        font-size: 10px;
        font-weight: 800;
      }

      .details-panel {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .details {
        min-height: 0;
        overflow: auto;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .card,
      .focus,
      .section {
        border: 1px solid rgba(25, 49, 104, 0.16);
        border-radius: 14px;
        padding: 12px;
        background: var(--shell-strong);
      }

      .route-path {
        display: inline-block;
        margin-left: 8px;
        font-family: "Syne", sans-serif;
        font-size: 20px;
      }

      .summary {
        margin: 9px 0 0;
        color: var(--ink-soft);
        font-size: 14px;
        line-height: 1.42;
      }

      .focus b {
        display: block;
        margin-bottom: 4px;
      }

      .section h3 {
        margin: 0 0 8px;
        color: var(--ink-soft);
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.08em;
      }

      .steps {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 7px;
      }

      .steps li {
        border: 1px solid rgba(25, 49, 104, 0.14);
        border-radius: 10px;
        background: #f9fbff;
        font-size: 13px;
        line-height: 1.35;
        padding: 8px 9px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        border: 1px solid rgba(25, 49, 104, 0.2);
        border-radius: 999px;
        background: #f6faff;
        color: #1d3c72;
        font-size: 12px;
        padding: 5px 10px;
      }

      .empty {
        margin: 0;
        color: var(--ink-soft);
        font-size: 13px;
      }

      .error {
        border: 1px solid rgba(231, 81, 115, 0.45);
        border-radius: 12px;
        background: rgba(255, 236, 242, 0.95);
        color: #a62948;
        font-size: 13px;
        padding: 10px;
      }

      .impact-controls {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }

      .impact-select,
      .impact-input {
        width: 100%;
        border: 1px solid rgba(25, 49, 104, 0.2);
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        font-size: 12px;
        color: #18366b;
        background: #ffffff;
      }

      .impact-select:focus,
      .impact-input:focus {
        outline: none;
        border-color: rgba(36, 95, 228, 0.55);
        box-shadow: 0 0 0 3px rgba(36, 95, 228, 0.14);
      }

      .impact-actions {
        display: flex;
        gap: 8px;
      }

      .impact-actions button {
        flex: 1;
      }

      .impact-hint {
        margin: 8px 0 0;
        color: var(--ink-soft);
        font-size: 12px;
        line-height: 1.42;
      }

      .impact-results {
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
        max-height: 290px;
        overflow: auto;
      }

      .impact-item {
        border: 1px solid rgba(25, 49, 104, 0.15);
        border-radius: 11px;
        background: #f8fbff;
        padding: 8px;
      }

      .impact-item-top {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .impact-path {
        font-size: 12px;
        font-weight: 700;
        color: #15386f;
        word-break: break-word;
      }

      .impact-how {
        margin: 6px 0 0;
        color: var(--ink-soft);
        font-size: 12px;
        line-height: 1.4;
      }

      .impact-ops,
      .impact-match,
      .impact-flow {
        margin: 5px 0 0;
        color: #2b4b84;
        font-size: 11px;
        line-height: 1.35;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1460px) {
        .overview-grid {
          grid-template-columns: 280px minmax(600px, 1fr) 330px;
        }

        .detail-grid {
          grid-template-columns: minmax(640px, 1fr) 340px;
        }
      }

      @media (max-width: 1240px) {
        .shell {
          padding: 12px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }

        .stats {
          grid-template-columns: repeat(3, minmax(100px, 1fr));
        }

        .topbar-right {
          justify-content: flex-start;
          flex-wrap: wrap;
        }

        .overview-grid,
        .detail-grid {
          grid-template-columns: 1fr;
          grid-template-rows: auto;
        }

        .navigator-body,
        .details {
          height: auto;
          max-height: none;
        }

        .overview-svg,
        .journey-scroll {
          height: 62vh;
          min-height: 430px;
        }
      }

      @media (max-width: 720px) {
        .brand h1 {
          font-size: 26px;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .topbar-right {
          width: 100%;
        }

        .back-main-btn {
          width: 100%;
        }

        .route-path {
          display: block;
          margin: 8px 0 0;
          font-size: 18px;
        }

        .journey-toolbar {
          display: grid;
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const { useEffect, useMemo, useState } = React;

      const fallbackApis = [
        {
          method: 'GET',
          path: '/api/graph',
          summary: 'Returns generated API dependency graph data for visualization.',
          flow: [
            'Receive request from UI explorer',
            'Read .apimap/graph.json from cache files',
            'Respond with graph payload'
          ],
          tables: [],
          services: [],
          caches: ['.apimap/graph.json'],
          queues: [],
          tableAccess: []
        },
        {
          method: 'GET',
          path: '/api/apis',
          summary: 'Returns API knowledge summaries from cache for endpoint navigation.',
          flow: [
            'Receive request from UI explorer',
            'Read .apimap/api_knowledge.json from cache files',
            'Flatten API entries and return the list'
          ],
          tables: [],
          services: [],
          caches: ['.apimap/api_knowledge.json'],
          queues: [],
          tableAccess: []
        },
        {
          method: 'GET',
          path: '/api/accounts/:accountId',
          summary: 'Demo endpoint: reads profile columns and updates the account audit trail.',
          flow: [
            'Read accounts.id, accounts.status, and accounts.tier to build the response payload',
            'Update account_audit.last_viewed_at for recent activity tracking',
            'Return enriched account information to the caller'
          ],
          tables: ['accounts', 'account_audit'],
          services: [],
          caches: [],
          queues: [],
          tableAccess: [
            {
              table: 'accounts',
              columns: ['id', 'status', 'tier'],
              operations: ['SELECT'],
              evidence: ['select id, status, tier from accounts where id = ?']
            },
            {
              table: 'account_audit',
              columns: ['last_viewed_at', 'account_id'],
              operations: ['UPDATE'],
              evidence: ['update account_audit set last_viewed_at = now() where account_id = ?']
            }
          ]
        }
      ];

      const resourceMeta = {
        table: { color: '#a3dd60', title: 'TABLE' },
        service: { color: '#74b8ff', title: 'SERVICE' },
        cache: { color: '#5bd8c2', title: 'CACHE' },
        queue: { color: '#f59ab0', title: 'QUEUE' }
      };

      function methodClass(method) {
        return `m-${String(method || '').toLowerCase()}`;
      }

      function methodGradient(method) {
        const value = String(method || '').toUpperCase();
        if (value === 'GET') return 'url(#mGet)';
        if (value === 'POST') return 'url(#mPost)';
        if (value === 'PUT') return 'url(#mPut)';
        if (value === 'PATCH') return 'url(#mPatch)';
        if (value === 'DELETE') return 'url(#mDelete)';
        return 'url(#mPost)';
      }

      function dedupeStrings(values) {
        const out = [];
        const seen = new Set();
        for (const value of values || []) {
          const text = String(value || '').trim();
          if (!text) continue;
          const key = text.toLowerCase();
          if (seen.has(key)) continue;
          seen.add(key);
          out.push(text);
        }
        return out;
      }

      function normalizeTableAccessEntries(raw) {
        if (!Array.isArray(raw)) return [];
        const entries = [];

        for (const item of raw) {
          if (!item || !item.table) continue;
          entries.push({
            table: String(item.table),
            columns: dedupeStrings(Array.isArray(item.columns) ? item.columns : []),
            operations: dedupeStrings(Array.isArray(item.operations) ? item.operations : []),
            evidence: dedupeStrings(Array.isArray(item.evidence) ? item.evidence : [])
          });
        }

        return entries;
      }

      function localTableAccess(api) {
        const tableAccess = normalizeTableAccessEntries(api.tableAccess);
        if (tableAccess.length) return tableAccess;

        return dedupeStrings(api.tables).map((table) => ({
          table,
          columns: ['*'],
          operations: ['UNKNOWN'],
          evidence: []
        }));
      }

      function impactVerb(operations) {
        const set = new Set((operations || []).map((value) => String(value || '').toUpperCase()));
        const reads = set.has('SELECT');
        const writes = set.has('INSERT') || set.has('UPDATE') || set.has('DELETE') || set.has('UPSERT');
        if (reads && writes) return 'reads and writes';
        if (reads) return 'reads';
        if (writes) return 'writes';
        return 'touches';
      }

      function impactHow(verb, table, column, match) {
        const prefix = `${verb.charAt(0).toUpperCase()}${verb.slice(1)}`;
        if (!column) return `${prefix} table ${table}`;
        if (match === 'explicit') return `${prefix} column ${column} in table ${table}`;
        if (match === 'wildcard') return `${prefix} table ${table} via wildcard access; ${column} may be impacted`;
        return `${prefix} table ${table}; column impact inferred from table-level metadata`;
      }

      function buildLocalImpactPayload(apis, filters = {}) {
        const tableFilter = String(filters.table || '').trim();
        const columnFilter = String(filters.column || '').trim();
        const tableFilterKey = tableFilter.toLowerCase();
        const columnFilterKey = columnFilter.toLowerCase();
        const tableMap = new Map();
        const results = [];

        for (const api of apis || []) {
          const access = localTableAccess(api);
          for (const entry of access) {
            const tableKey = entry.table.toLowerCase();
            if (!tableMap.has(tableKey)) {
              tableMap.set(tableKey, { table: entry.table, columns: new Set(), apiIds: new Set() });
            }

            const tableMeta = tableMap.get(tableKey);
            tableMeta.apiIds.add(`${api.method} ${api.path}`);
            for (const column of entry.columns) {
              tableMeta.columns.add(column);
            }
          }
        }

        if (tableFilter) {
          for (const api of apis || []) {
            const access = localTableAccess(api).filter((entry) => entry.table.toLowerCase() === tableFilterKey);
            if (!access.length) continue;

            const operations = new Set();
            const columns = new Set();
            const evidence = [];
            let match = 'table';
            let matchedEntry = false;

            for (const entry of access) {
              const columnKeys = new Set((entry.columns || []).map((value) => value.toLowerCase()));
              if (columnFilterKey) {
                if (columnKeys.has(columnFilterKey)) {
                  match = 'explicit';
                } else if (columnKeys.has('*')) {
                  if (match !== 'explicit') match = 'wildcard';
                } else if (!entry.columns || !entry.columns.length) {
                  if (match === 'table') match = 'inferred-table';
                } else {
                  continue;
                }
              }

              matchedEntry = true;
              for (const operation of entry.operations || []) operations.add(operation);
              for (const column of entry.columns || []) columns.add(column);
              for (const hint of entry.evidence || []) {
                if (evidence.length < 2) evidence.push(hint);
              }
            }

            if (!matchedEntry) continue;

            const method = String(api.method || '').toUpperCase();
            const path = String(api.path || '');
            const verb = impactVerb([...operations]);

            results.push({
              method,
              path,
              summary: api.summary || `${method} ${path} endpoint`,
              table: tableFilter,
              operations: [...operations],
              columns: [...columns],
              columnMatch: columnFilterKey ? match : 'table',
              impact: verb,
              how: impactHow(verb, tableFilter, columnFilter, match),
              flowMatches: (api.flow || []).filter((step) => {
                const text = String(step || '').toLowerCase();
                if (text.includes(tableFilterKey)) return true;
                return columnFilterKey ? text.includes(columnFilterKey) : false;
              }),
              evidence
            });
          }
        }

        return {
          totalApis: (apis || []).length,
          tables: [...tableMap.values()].map((entry) => ({
            table: entry.table,
            columns: [...entry.columns].sort((a, b) => {
              if (a === '*') return -1;
              if (b === '*') return 1;
              return a.localeCompare(b);
            }),
            apiCount: entry.apiIds.size
          })).sort((a, b) => a.table.localeCompare(b.table)),
          filters: { table: tableFilter, column: columnFilter },
          results: results.sort((a, b) => `${a.method} ${a.path}`.localeCompare(`${b.method} ${b.path}`))
        };
      }

      function columnMatchLabel(value) {
        if (value === 'explicit') return 'Explicit column mapping';
        if (value === 'wildcard') return 'Wildcard query mapping';
        if (value === 'inferred-table') return 'Inferred from table-level metadata';
        return 'Table-level mapping';
      }

      function normalizeApis(raw) {
        const list = Array.isArray(raw) ? raw : [];
        const deduped = [];
        const seen = new Set();

        for (const item of list) {
          if (!item || !item.method || !item.path) continue;
          const method = String(item.method).toUpperCase();
          const key = `${method} ${item.path}`;
          if (seen.has(key)) continue;
          seen.add(key);

          deduped.push({
            method,
            path: item.path,
            summary: item.summary || 'No summary available.',
            flow: Array.isArray(item.flow) ? item.flow : [],
            tables: dedupeStrings(Array.isArray(item.tables) ? item.tables : []),
            services: dedupeStrings(Array.isArray(item.services) ? item.services : []),
            caches: dedupeStrings(Array.isArray(item.caches) ? item.caches : []),
            queues: dedupeStrings(Array.isArray(item.queues) ? item.queues : []),
            tableAccess: normalizeTableAccessEntries(item.tableAccess)

        return deduped;

            x: cx + Math.cos(angle) * radius,
            y: cy + Math.sin(angle) * radius,
            r: 66

        for (const queue of api.queues) resources.push({ type: 'queue', label: queue, ...resourceMeta.queue });

              React.createElement('div', { className: 'panel-head', key: 'h' }, [
                React.createElement('h2', { key: 't' }, 'Guided UX Flow'),
                React.createElement('p', { key: 's' }, 'The same data and features, now split into cleaner interaction steps.')
              ]),
              React.createElement('div', { className: 'overview-side', key: 'b' }, [
                React.createElement('div', { className: 'showcase', key: 'a' }, [
                  React.createElement('h3', { key: 't' }, '1. Discover'),
                  React.createElement('p', { key: 'p' }, 'Use search or the constellation map to pick an API endpoint.'),
                  React.createElement('h3', { key: 't2', style: { marginTop: '12px' } }, '2. Dive Deep'),
                  React.createElement('p', { key: 'p2' }, 'Open a focused screen where flow steps and dependencies are laid out with dedicated space.')
                ]),
                selectedApi
                  ? React.createElement('div', { className: 'showcase', key: 's' }, [
                      React.createElement('h3', { key: 't' }, `${selectedApi.method} ${selectedApi.path}`),
                      React.createElement('p', { key: 'p' }, selectedApi.summary),
                      React.createElement('button', {
                        key: 'btn',
                        type: 'button',
                        className: 'primary-btn',
                        onClick: () => setView('detail'),
                        style: { marginTop: '12px' }
                      }, 'Open Detail Screen')
                    ])
                  : React.createElement('div', { className: 'showcase', key: 'empty' }, [
                      React.createElement('h3', { key: 't' }, 'No endpoint selected'),
                      React.createElement('p', { key: 'p' }, 'Pick any bubble to continue to the detailed journey layout.')
                    ]),
                renderImpactAnalysisCard(),
                error ? React.createElement('div', { className: 'error', key: 'err' }, error) : null
              ])
            ])
          ]);
        }

        function renderDetail() {
          if (!selectedApi) return renderOverview();

          return React.createElement('main', { className: 'view-grid detail-grid' }, [
            React.createElement('section', { className: 'panel journey-panel', key: 'journey' }, [
              React.createElement('div', { className: 'panel-head journey-toolbar', key: 'h' }, [
                React.createElement('div', { className: 'route', key: 'r' }, [
                  React.createElement('span', { className: `method ${methodClass(selectedApi.method)}`, key: 'm' }, selectedApi.method),
                  React.createElement('span', { key: 'p' }, selectedApi.path)
                ]),
                React.createElement('button', {
                  key: 'back',
                  type: 'button',
                  className: 'ghost-btn',
                  onClick: () => setView('overview')
                }, 'Back to Constellation')
              ]),

              React.createElement('div', { className: 'journey-wrap', key: 'g' }, [
                React.createElement('div', { className: 'journey-scroll', key: 'scroll' }, [
                  React.createElement(
                    'svg',
                    {
                      className: 'journey-svg',
                      viewBox: `0 0 ${journey.width} ${journey.height}`,
                      width: journey.width,
                      height: journey.height,
                      key: 'svg'
                    },
                    [
                      React.createElement('defs', { key: 'defs' }, [
                        React.createElement('linearGradient', { id: 'apiCore', x1: '0%', y1: '0%', x2: '100%', y2: '100%', key: 'a' }, [
                          React.createElement('stop', { key: 's1', offset: '0%', 'stop-color': '#ffd36b' }),
                          React.createElement('stop', { key: 's2', offset: '100%', 'stop-color': '#ff9f5d' })
                        ]),
                        React.createElement('linearGradient', { id: 'stepCore', x1: '0%', y1: '0%', x2: '100%', y2: '100%', key: 'b' }, [
                          React.createElement('stop', { key: 's1', offset: '0%', 'stop-color': '#4d8cff' }),
                          React.createElement('stop', { key: 's2', offset: '100%', 'stop-color': '#2a62da' })
                        ])
                      ]),

                      React.createElement('rect', {
                        key: 'bg',
                        x: 0,
                        y: 0,
                        width: journey.width,
                        height: journey.height,
                        fill: 'rgba(255,255,255,0.26)'
                      }),

                      journey.flowNodes.length
                        ? React.createElement('path', {
                            key: 'api-edge',
                            className: 'flow-edge',
                            d: `M ${journey.apiNode.x + journey.apiNode.r} ${journey.apiNode.y} C ${journey.apiNode.x + 112} ${journey.apiNode.y}, ${journey.flowNodes[0].x - 120} ${journey.flowNodes[0].y}, ${journey.flowNodes[0].x - journey.flowNodes[0].w / 2} ${journey.flowNodes[0].y}`
                          })
                        : null,

                      ...journey.flowNodes.map((node, i) => {
                        if (i === journey.flowNodes.length - 1) return null;
                        const next = journey.flowNodes[i + 1];
                        return React.createElement('path', {
                          key: `flow-edge-${node.id}`,
                          className: 'flow-edge',
                          d: `M ${node.x + node.w / 2} ${node.y} C ${node.x + 110} ${node.y}, ${next.x - 110} ${next.y}, ${next.x - next.w / 2} ${next.y}`
                        });
                      }),

                      ...journey.resourceNodes.map((resource) =>
                        React.createElement('path', {
                          key: `res-edge-${resource.id}`,
                          className: 'resource-edge',
                          d: `M ${journey.anchor.x} ${journey.anchor.y} C ${journey.anchor.x + 92} ${journey.anchor.y}, ${resource.x - 80} ${resource.y}, ${resource.x - resource.r} ${resource.y}`
                        })
                      ),

                      React.createElement(
                        'g',
                        {
                          key: 'api-node',
                          className: 'bubble',
                          role: 'button',
                          tabIndex: 0,
                          onClick: () => setFocused({ title: `${selectedApi.method} ${selectedApi.path}`, body: selectedApi.summary }),
                          onKeyDown: (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                              setFocused({ title: `${selectedApi.method} ${selectedApi.path}`, body: selectedApi.summary });
                            }
                          }
                        },
                        [
                          React.createElement('circle', {
                            key: 'halo',
                            cx: journey.apiNode.x,
                            cy: journey.apiNode.y,
                            r: journey.apiNode.r + 9,
                            fill: 'rgba(242, 154, 43, 0.24)'
                          }),
                          React.createElement('circle', {
                            key: 'node',
                            className: 'surface',
                            cx: journey.apiNode.x,
                            cy: journey.apiNode.y,
                            r: journey.apiNode.r,
                            fill: 'url(#apiCore)',
                            stroke: '#dc7f20',
                            'stroke-width': 2
                          }),
                          React.createElement('text', { key: 'm', className: 'api-label method', x: journey.apiNode.x, y: journey.apiNode.y - 8 }, selectedApi.method),
                          React.createElement('text', { key: 'p', className: 'api-label path', x: journey.apiNode.x, y: journey.apiNode.y + 14 }, truncate(selectedApi.path, 17))
                        ]
                      ),

                      ...journey.flowNodes.map((node) =>
                        React.createElement(
                          'g',
                          {
                            key: node.id,
                            className: 'bubble',
                            role: 'button',
                            tabIndex: 0,
                            onClick: () => setFocused({ title: `Flow Step ${node.index + 1}`, body: node.label }),
                            onKeyDown: (e) => {
                              if (e.key === 'Enter' || e.key === ' ') setFocused({ title: `Flow Step ${node.index + 1}`, body: node.label });
                            }
                          },
                          [
                            React.createElement('rect', {
                              key: 'rect',
                              className: 'surface',
                              x: node.x - node.w / 2,
                              y: node.y - node.h / 2,
                              width: node.w,
                              height: node.h,
                              rx: 14,
                              fill: 'url(#stepCore)',
                              stroke: '#95bfff',
                              'stroke-width': 1.5
                            }),
                            React.createElement('text', { key: 'step', className: 'flow-label step', x: node.x, y: node.y - 9 }, `STEP ${node.index + 1}`),
                            React.createElement('text', { key: 'body', className: 'flow-label body', x: node.x, y: node.y + 13 }, truncate(node.label, 24))
                          ]
                        )
                      ),

                      ...journey.resourceNodes.map((resource) =>
                        React.createElement(
                          'g',
                          {
                            key: resource.id,
                            className: 'bubble',
                            role: 'button',
                            tabIndex: 0,
                            onClick: () => setFocused({ title: `${resource.title} Resource`, body: resource.label }),
                            onKeyDown: (e) => {
                              if (e.key === 'Enter' || e.key === ' ') setFocused({ title: `${resource.title} Resource`, body: resource.label });
                            }
                          },
                          [
                            React.createElement('circle', {
                              key: 'c',
                              className: 'surface',
                              cx: resource.x,
                              cy: resource.y,
                              r: resource.r,
                              fill: resource.color,
                              stroke: '#ffffff',
                              'stroke-width': 1.2
                            }),
                            React.createElement('text', { key: 't', className: 'resource-label', x: resource.x, y: resource.y + 4 }, truncate(resource.label, 14))
                          ]
                        )
                      )
                    ]
                  )
                ])
              ])
            ]),

            React.createElement('section', { className: 'panel details-panel', key: 'details' }, [
              React.createElement('div', { className: 'panel-head', key: 'h' }, [
                React.createElement('h2', { key: 't' }, 'Route Intelligence'),
                React.createElement('p', { key: 's' }, 'Same feature set, clearer structure: route summary, flow list, and linked resources.')
              ]),
              detailsContent()
            ])
          ]);
        }

        return React.createElement('div', { className: 'shell' }, [
          React.createElement('header', { className: 'topbar', key: 'head' }, [
            React.createElement('div', { className: 'brand', key: 'brand' }, [
              React.createElement('h1', { key: 'h' }, 'APIFlow Constellation'),
              React.createElement('p', { key: 'p' }, 'Discover endpoint journeys, then run impact analysis to see exactly which APIs are affected when a table or column changes.'),
              React.createElement('div', { className: 'badge-row', key: 'badges' }, [
                React.createElement('span', { className: 'badge', key: 'b1' }, 'Discover'),
                React.createElement('span', { className: 'badge', key: 'b2' }, 'Detail Screen'),
                React.createElement('span', { className: 'badge', key: 'b3' }, 'Flow + Dependencies'),
                React.createElement('span', { className: 'badge', key: 'b4' }, 'Impact Analysis')
              ])
            ]),
            React.createElement('div', { className: 'topbar-right', key: 'right' }, [
              React.createElement('div', { className: 'stats', key: 'stats' }, [
                React.createElement('div', { className: 'stat', key: 's1' }, [
                  React.createElement('strong', { key: 'v' }, String(apis.length)),
                  React.createElement('span', { key: 'l' }, 'Endpoints')
                ]),
                React.createElement('div', { className: 'stat', key: 's2' }, [
                  React.createElement('strong', { key: 'v' }, String(selectedApi ? selectedApi.flow.length : 0)),
                  React.createElement('span', { key: 'l' }, 'Flow Steps')
                ]),
                React.createElement('div', { className: 'stat', key: 's3' }, [
                  React.createElement('strong', { key: 'v' }, String(selectedResourceCount)),
                  React.createElement('span', { key: 'l' }, 'Resources')
                ])
              ]),
              view === 'detail' && selectedApi
                ? React.createElement('button', {
                    key: 'back-main',
                    type: 'button',
                    className: 'back-main-btn',
                    onClick: () => setView('overview')
                  }, 'Back to Main Screen')
                : null
            ])
          ]),

          view === 'detail' && selectedApi ? renderDetail() : renderOverview()
        ]);
      }

      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
  </body>
</html>
